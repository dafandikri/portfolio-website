services:
  # =============================================
  # App container — Nginx serving static React build
  # =============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TMDB_API_KEY: ${TMDB_API_KEY:-}
    restart: unless-stopped
    expose:
      - "8080"
  
  # =============================================
  # Edge proxy — TLS termination, gzip, caching
  # =============================================
  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount the Nginx configuration and TLS certs
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
/* ===================== PROBLEM CARD ===================== */
function ProblemCard({p,progress,setProgress}){
  const [open,setOpen]=useState(false);
  const rated=progress.recall?.[p.id];
  const setRate=(r)=>setProgress(pp=>({...pp,recall:{...pp.recall,[p.id]:r}}));
  const dcol=p.diff==='hard'?'hi':p.diff==='med'?'med':'core';
  return(
    <div className="prob">
      <div className="prob-meta">
        <span className={'tag '+dcol}>{p.diff.toUpperCase()}</span>
        <span className="tag">{p.type==='compute'?'🧮 compute':p.type==='concept'?'💡 concept':'📝 MCQ'}</span>
        <span className="tag" style={{marginLeft:'auto'}}>📄 {p.source}</span>
      </div>
      <div className="prob-q"><RichText text={p.q}/></div>
      {p.given && <div className="given">{p.given}</div>}
      {!open && <button className="reveal-btn" onClick={()=>setOpen(true)}>Show worked solution ↓</button>}
      {open && <div className="sol">
        {p.steps.map((s,i)=><div key={i} className="step"><span className="step-n">{i+1}</span><span><RichText text={s}/></span></div>)}
        <div className="ans"><b>Answer:</b> <RichText text={p.answer}/></div>
        {p.tip && <div style={{fontFamily:'var(--sans)',fontSize:14,color:'var(--ink-faint)',marginTop:10}}>💡 <RichText text={p.tip}/></div>}
        <div className="recall">
          <span>How did you do? (active recall)</span>
          <button className={'miss'+(rated==='miss'?' sel-miss':'')} onClick={()=>setRate('miss')}>Missed it</button>
          <button className={'ok'+(rated==='ok'?' sel-ok':'')} onClick={()=>setRate('ok')}>Shaky</button>
          <button className={'got'+(rated==='got'?' sel-got':'')} onClick={()=>setRate('got')}>Got it ✓</button>
          <button className="reveal-btn" style={{background:'none',color:'var(--ink-faint)',padding:'6px 10px',marginLeft:'auto'}} onClick={()=>setOpen(false)}>Hide</button>
        </div>
      </div>}
    </div>
  );
}

/* ===================== PRACTICE ENGINE ===================== */
function Practice({progress,setProgress}){
  const [topicF,setTopicF]=useState('all');
  const [diffF,setDiffF]=useState('all');
  const [onlyWeak,setOnlyWeak]=useState(false);
  const list=PROBLEMS.filter(p=>(topicF==='all'||p.topic===topicF)&&(diffF==='all'||p.diff===diffF)&&(!onlyWeak||['miss','ok'].includes(progress.recall?.[p.id])));
  const counts={got:0,ok:0,miss:0};Object.values(progress.recall||{}).forEach(r=>counts[r]!==undefined&&counts[r]++);
  return(
    <div className="read fade-in">
      <div style={{paddingTop:34}}>
        <div className="kicker">✍️ Active Recall</div>
        <h1 className="h-title" style={{fontSize:'clamp(30px,4.4vw,44px)'}}>Practice Engine</h1>
        <p className="dek">Every problem is from the real UAS 2024 / 2025 papers (or directly derived). Try it on paper first — then reveal the step-by-step solution and rate yourself.</p>
      </div>
      <div className="stat-row">
        <div className="stat"><div className="stat-v" style={{color:'var(--good)'}}>{counts.got}</div><div className="stat-l">Got it ✓</div></div>
        <div className="stat"><div className="stat-v" style={{color:'var(--med)'}}>{counts.ok}</div><div className="stat-l">Shaky</div></div>
        <div className="stat"><div className="stat-v" style={{color:'var(--hi)'}}>{counts.miss}</div><div className="stat-l">Missed</div></div>
        <div className="stat"><div className="stat-v">{PROBLEMS.length}</div><div className="stat-l">Total</div></div>
      </div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center',margin:'18px 0'}}>
        <div className="seg">
          <button className={topicF==='all'?'on':''} onClick={()=>setTopicF('all')}>All topics</button>
          {CONTENT.map(t=><button key={t.id} className={topicF===t.id?'on':''} onClick={()=>setTopicF(t.id)}>{t.icon}</button>)}
        </div>
        <div className="seg">
          {['all','easy','med','hard'].map(d=><button key={d} className={diffF===d?'on':''} onClick={()=>setDiffF(d)}>{d}</button>)}
        </div>
        <button className={'pill-btn'+(onlyWeak?' ':'')} style={onlyWeak?{borderColor:'var(--hi)',color:'var(--hi)'}:{}} onClick={()=>setOnlyWeak(w=>!w)}>{onlyWeak?'★ ':''}Only my weak ones</button>
      </div>
      {list.length===0?<div className="cheat-empty">No problems match — try clearing a filter. {onlyWeak&&'(Rate some problems "Shaky/Missed" to build your review list.)'}</div>
        :list.map(p=><ProblemCard key={p.id} p={p} progress={progress} setProgress={setProgress}/>)}
    </div>
  );
}

/* ===================== CHEATSHEET BUILDER ===================== */
function Cheatsheet({cheat,setCheat}){
  const byTopic={};cheat.forEach(c=>{(byTopic[c.topic]=byTopic[c.topic]||[]).push(c);});
  const tname=id=>{const t=CONTENT.find(x=>x.id===id);return t?t.icon+' '+t.title:id;};
  return(
    <div className="read fade-in">
      <div style={{paddingTop:34}}>
        <div className="kicker">📋 Allowed: 3 handwritten A4 sheets</div>
        <h1 className="h-title" style={{fontSize:'clamp(30px,4.4vw,44px)'}}>Cheatsheet Builder</h1>
        <p className="dek">Add formulas from any topic (the <b>+ cheatsheet</b> buttons). This prints to a dense 3-column layout — use it to plan what you'll handwrite onto your real sheets.</p>
      </div>
      <div className="no-print" style={{display:'flex',gap:12,flexWrap:'wrap',margin:'10px 0 6px'}}>
        <button className="print-btn" onClick={()=>window.print()}>🖨️ Print / Save PDF</button>
        {cheat.length>0 && <button className="pill-btn" onClick={()=>setCheat([])}>Clear all</button>}
        <span style={{fontFamily:'var(--sans)',fontSize:14,color:'var(--ink-faint)',alignSelf:'center'}}>{cheat.length} formula{cheat.length!==1?'s':''} selected</span>
      </div>
      {cheat.length===0

        : <div className="cheat-page">
            {Object.keys(byTopic).map(tid=><div key={tid}>
              <div style={{fontFamily:'var(--sans)',fontWeight:700,fontSize:11,color:'#2f5d50',borderBottom:'1px solid #ccc',marginBottom:6,paddingBottom:2,breakInside:'avoid'}}>{tname(tid)}</div>
              {byTopic[tid].map((c,i)=><div key={i} className="cheat-item">
                <div className="cn"><span>{c.n}</span><span className="rm no-print" onClick={()=>setCheat(cheat.filter(x=>x.key!==c.key))}>✕</span></div>

              </div>)}
            </div>)}
          </div>}
    </div>
  );
}

          <button className="pill-btn" onClick={()=>go({type:'cheat'})}>📋 Cheatsheet {cheat.length>0&&`(${cheat.length})`}</button>
          <div className="bar-spacer"></div>
          <button className="icon-btn" title="Toggle theme" onClick={()=>setTheme(t=>t==='light'?'dark':'light')}>{theme==='light'?'🌙':'☀️'}</button>
        </div>
        <div className="canvas">
          {view.type==='home' && <Dashboard go={go} progress={progress}/>}
          {view.type==='topic' && topic && <TopicView topic={topic} progress={progress} setProgress={setProgress} cheat={cheat} setCheat={setCheat} go={go}/>}
          {view.type==='practice' && <Practice progress={progress} setProgress={setProgress}/>}
          {view.type==='master' && <MasterSheet/>}
          {view.type==='cheat' && <Cheatsheet cheat={cheat} setCheat={setCheat}/>}
        </div>
      </div>
      <Pomodoro/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DatMin Cram — Data Mining Final Exam Study Hub</title>
<meta name="description" content="A deep, visual, last-minute study hub for the Penambangan Data (Data Mining) final exam — Fasilkom UI." />

<!-- KaTeX for LaTeX math -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>

<!-- React + Babel (single-file interactivity) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Mermaid for algorithm pipelines / flowcharts -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<!-- Editorial typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DESIGN SYSTEM — "Scholar's Paper": Medium editorial + academic
   ============================================================ */
:root{
  --paper:#fbfaf7; --paper-2:#ffffff; --paper-raise:#fffefb;
  --ink:#1b1a17; --ink-soft:#403d37; --ink-faint:#6f6a60;
  --line:#e8e4da; --line-soft:#f0ece3;
  --accent:#2f5d50;          /* scholarly teal-green */
  --accent-soft:#e7f0ec;
  --gold:#9a7b25; --gold-soft:#f6efdc;
  --hi:#b23a48; --hi-soft:#fbe9eb;    /* high exam weight */
  --med:#b5781f; --med-soft:#fbf0dd;  /* medium weight */
  --core:#3f6f8f; --core-soft:#e7f0f5;/* toolkit / core */
  --good:#2f7a4d; --good-soft:#e6f4ec;
  --shadow:0 1px 2px rgba(30,28,24,.04),0 8px 28px rgba(30,28,24,.06);
  --shadow-lg:0 2px 6px rgba(30,28,24,.06),0 24px 60px rgba(30,28,24,.12);
  --serif:'Newsreader',Georgia,'Times New Roman',serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --rail:300px; --read:720px;
}
[data-theme="dark"]{
  --paper:#16161a; --paper-2:#1c1c21; --paper-raise:#1f1f25;
  --ink:#ece9e2; --ink-soft:#c7c3ba; --ink-faint:#8e897e;
  --line:#2c2c33; --line-soft:#26262c;
  --accent:#7fc9b4; --accent-soft:#1d2a27;
  --gold:#d8b65a; --gold-soft:#2a2519;
  --hi:#e8868f; --hi-soft:#2e1d20;
  --med:#e0a85a; --med-soft:#2c2418; --core:#86b6d4; --core-soft:#1a242c;
  --good:#74c98f; --good-soft:#18271e;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.35);
  --shadow-lg:0 2px 6px rgba(0,0,0,.4),0 24px 60px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:var(--serif);font-size:18px;line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  transition:background .3s,color .3s;
}
.sans{font-family:var(--sans)}
.mono{font-family:var(--mono)}
a{color:inherit}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;line-height:1.18;letter-spacing:-.012em;color:var(--ink)}
::selection{background:var(--accent-soft);color:var(--ink)}

/* ---- Layout shell ---- */
.shell{display:grid;grid-template-columns:var(--rail) 1fr;min-height:100vh}
.rail{
  position:sticky;top:0;height:100vh;overflow-y:auto;
  border-right:1px solid var(--line);background:var(--paper-2);
  padding:26px 20px 40px;display:flex;flex-direction:column;gap:6px;
}
.rail::-webkit-scrollbar{width:8px}.rail::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.main{min-width:0;display:flex;flex-direction:column}
.canvas{width:100%;max-width:calc(var(--read) + 220px);margin:0 auto;padding:0 28px 140px;flex:1}
@media(max-width:920px){
  .shell{grid-template-columns:1fr}
  .rail{position:fixed;z-index:60;width:84%;max-width:320px;transform:translateX(-105%);transition:transform .28s;box-shadow:var(--shadow-lg)}
  .rail.open{transform:translateX(0)}
  .canvas{padding:0 18px 140px}
}

/* ---- Brand / nav ---- */
.brand{display:flex;align-items:center;gap:11px;margin-bottom:18px;cursor:pointer}
.brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(140deg,var(--accent),#1f3d34);display:grid;place-items:center;color:#fff;font-family:var(--serif);font-weight:600;font-size:21px;box-shadow:var(--shadow)}
.brand-name{font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:-.01em;line-height:1.1}
.brand-sub{font-family:var(--sans);font-size:11.5px;color:var(--ink-faint);letter-spacing:.02em}
.nav-label{font-family:var(--sans);font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);margin:18px 4px 7px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink-soft);transition:background .15s,color .15s;border:1px solid transparent}
.nav-item:hover{background:var(--paper-raise);color:var(--ink)}
.nav-item.active{background:var(--accent-soft);color:var(--ink);border-color:var(--line)}
.nav-ico{font-size:16px;width:20px;text-align:center;flex:none}
.nav-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:var(--sans)}
.b-hi{background:var(--hi-soft);color:var(--hi)} .b-med{background:var(--med-soft);color:var(--med)} .b-core{background:var(--core-soft);color:var(--core)}
.nav-dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--good)}

/* ---- Top bar ---- */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;padding:13px 28px;background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
@media(max-width:920px){.topbar{padding:11px 16px}}
.hamb{display:none;font-size:20px;cursor:pointer;color:var(--ink-soft);background:none;border:none}
@media(max-width:920px){.hamb{display:block}}
.bar-spacer{flex:1}
.pill-btn{font-family:var(--sans);font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);padding:7px 13px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.pill-btn:hover{border-color:var(--accent);color:var(--ink)}
.icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--paper-2);cursor:pointer;display:grid;place-items:center;font-size:16px;color:var(--ink-soft);transition:.15s}
.icon-btn:hover{border-color:var(--accent);color:var(--ink)}

/* ---- Reading column ---- */
.read{max-width:var(--read);margin:0 auto}
.read p{margin:0 0 1.15em;color:var(--ink-soft);font-size:20px;line-height:1.65}
.read p strong{color:var(--ink);font-weight:600}
.kicker{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.h-title{font-size:clamp(34px,5vw,52px);line-height:1.06;margin:14px 0 8px;letter-spacing:-.022em}
.dek{font-size:21px;color:var(--ink-faint);font-style:italic;line-height:1.5;margin-bottom:22px;font-weight:400}
.byline{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-family:var(--sans);font-size:13.5px;color:var(--ink-faint);margin-bottom:30px}
.dropcap::first-letter{float:left;font-family:var(--serif);font-weight:600;font-size:3.3em;line-height:.78;padding:6px 10px 0 0;color:var(--accent)}
.sec-h{font-size:27px;margin:46px 0 6px;scroll-margin-top:80px}
.sec-rule{width:42px;height:3px;background:var(--accent);border-radius:3px;margin:0 0 16px}

/* ---- Cards & callouts ---- */
.card{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:22px 24px;box-shadow:var(--shadow);margin:22px 0}
.callout{border-left:4px solid var(--accent);background:var(--accent-soft);border-radius:0 12px 12px 0;padding:15px 18px;margin:22px 0;font-size:17.5px;color:var(--ink-soft)}
.callout.gold{border-color:var(--gold);background:var(--gold-soft)}
.callout.hi{border-color:var(--hi);background:var(--hi-soft)}
.callout-t{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.callout.gold .callout-t{color:var(--gold)} .callout.hi .callout-t{color:var(--hi)}
.tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--paper-raise);border:1px solid var(--line);color:var(--ink-soft)}
.tag.hi{background:var(--hi-soft);border-color:transparent;color:var(--hi)}
.tag.med{background:var(--med-soft);border-color:transparent;color:var(--med)}
.tag.core{background:var(--core-soft);border-color:transparent;color:var(--core)}

/* ---- Concept blocks ---- */
.concept{border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:16px 0;background:var(--paper-raise);transition:.18s}
.concept:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.concept-h{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.concept-n{font-family:var(--sans);font-weight:700;font-size:17px;color:var(--ink)}
.concept-tl{font-family:var(--sans);font-size:11.5px;color:var(--ink-faint);font-style:italic}
.concept p{font-size:17.5px;margin:.4em 0;color:var(--ink-soft);line-height:1.55}
.mnem{font-family:var(--sans);font-size:13.5px;background:var(--gold-soft);color:var(--gold);border-radius:8px;padding:7px 11px;margin-top:9px;display:inline-block;font-weight:600}

/* ---- Formula sheet ---- */
.formula{border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin:12px 0;background:var(--paper-2);display:flex;flex-direction:column;gap:8px}
.formula-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.formula-n{font-family:var(--sans);font-weight:600;font-size:14.5px;color:var(--ink)}
.formula-body{overflow-x:auto;padding:6px 2px}
.formula-when{font-family:var(--sans);font-size:13px;color:var(--ink-faint)}
.cheat-add{font-family:var(--sans);font-size:11.5px;font-weight:600;border:1px dashed var(--line);background:none;color:var(--ink-faint);padding:4px 10px;border-radius:7px;cursor:pointer;transition:.15s;white-space:nowrap}
.cheat-add:hover{border-color:var(--accent);color:var(--accent)}
.cheat-add.in{background:var(--accent);color:#fff;border-style:solid;border-color:var(--accent)}

/* ---- KaTeX sizing ---- */
.katex{font-size:1.05em}
.katex-display{margin:.4em 0;overflow-x:auto;overflow-y:hidden;padding:4px 0}

/* ---- Viz frame ---- */
.viz{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:18px;margin:22px 0;box-shadow:var(--shadow)}
.viz-cap{font-family:var(--sans);font-size:12.5px;color:var(--ink-faint);text-align:center;margin-top:10px;font-style:italic}
.viz-title{font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.mermaid{display:flex;justify-content:center}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;margin:12px 0}
.ctrl button{font-family:var(--sans);font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--paper-raise);color:var(--ink-soft);padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s}
.ctrl button:hover,.ctrl button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.slider{width:100%;max-width:340px;accent-color:var(--accent)}

/* ---- Pills row / summary ---- */
.summary-grid{display:grid;gap:9px;margin:16px 0}
.summary-row{display:flex;gap:11px;align-items:flex-start;font-size:17px;color:var(--ink-soft)}
.summary-row .n{font-family:var(--sans);font-weight:700;color:var(--accent);flex:none;font-size:14px;margin-top:2px}

/* ---- Practice engine ---- */
.prob{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:22px 24px;margin:18px 0;box-shadow:var(--shadow)}
.prob-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:13px}
.prob-q{font-size:19px;color:var(--ink);line-height:1.5;margin-bottom:8px}
.prob-q strong{font-weight:600}
.given{background:var(--paper-raise);border:1px solid var(--line-soft);border-radius:10px;padding:12px 15px;margin:12px 0;font-family:var(--mono);font-size:14px;color:var(--ink-soft);white-space:pre-wrap;overflow-x:auto}
.reveal-btn{font-family:var(--sans);font-size:14px;font-weight:600;background:var(--ink);color:var(--paper);border:none;padding:10px 18px;border-radius:9px;cursor:pointer;transition:.15s;margin-top:6px}
.reveal-btn:hover{opacity:.88}
.sol{margin-top:16px;border-top:1px dashed var(--line);padding-top:16px;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.step{display:flex;gap:12px;margin:10px 0;font-size:17px;color:var(--ink-soft);line-height:1.55}
.step-n{flex:none;width:24px;height:24px;border-radius:7px;background:var(--accent-soft);color:var(--accent);font-family:var(--sans);font-weight:700;font-size:12.5px;display:grid;place-items:center;margin-top:1px}
.ans{background:var(--good-soft);border:1px solid color-mix(in srgb,var(--good) 30%,transparent);border-radius:11px;padding:13px 16px;margin-top:14px;font-size:17.5px}
.ans b{color:var(--good)}
.recall{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft)}
.recall span{font-family:var(--sans);font-size:13px;color:var(--ink-faint);margin-right:4px}
.recall button{font-family:var(--sans);font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--paper-raise);padding:6px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.recall button.miss:hover{background:var(--hi);color:#fff;border-color:var(--hi)}
.recall button.ok:hover{background:var(--med);color:#fff;border-color:var(--med)}
.recall button.got:hover{background:var(--good);color:#fff;border-color:var(--good)}
.recall button.sel-miss{background:var(--hi);color:#fff;border-color:var(--hi)}
.recall button.sel-ok{background:var(--med);color:#fff;border-color:var(--med)}
.recall button.sel-got{background:var(--good);color:#fff;border-color:var(--good)}

/* ---- Dashboard ---- */
.hero{padding:46px 0 8px}
.count{display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--hi);background:var(--hi-soft);padding:7px 14px;border-radius:30px;margin-bottom:20px}
.count .dotpulse{width:8px;height:8px;border-radius:50%;background:var(--hi);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;margin:24px 0}
.tcard{position:relative;background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;transition:.2s;box-shadow:var(--shadow);overflow:hidden}
.tcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--accent)}
.tcard-ico{font-size:26px;margin-bottom:12px}
.tcard-t{font-family:var(--sans);font-weight:700;font-size:16.5px;margin-bottom:5px;color:var(--ink)}
.tcard-d{font-size:15px;color:var(--ink-faint);line-height:1.45;font-family:var(--sans)}
.tcard-bar{height:5px;border-radius:5px;background:var(--line-soft);margin-top:14px;overflow:hidden}
.tcard-bar i{display:block;height:100%;background:var(--good);border-radius:5px;transition:width .5s}
.tcard-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-family:var(--sans);font-size:11.5px;color:var(--ink-faint)}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:22px 0}
.stat{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.stat-v{font-family:var(--sans);font-weight:700;font-size:26px;color:var(--ink);letter-spacing:-.02em}
.stat-l{font-family:var(--sans);font-size:12.5px;color:var(--ink-faint);margin-top:2px}

/* ---- Pomodoro ---- */
.pomo{position:fixed;right:22px;bottom:22px;z-index:70;background:var(--paper-2);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);width:230px;overflow:hidden;font-family:var(--sans)}
.pomo-head{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;background:var(--ink);color:var(--paper)}
.pomo-phase{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.pomo-body{padding:16px 15px;text-align:center}
.pomo-time{font-family:var(--mono);font-size:42px;font-weight:500;color:var(--ink);letter-spacing:-.02em;line-height:1}
.pomo-time.break{color:var(--good)}
.pomo-ctrl{display:flex;gap:8px;margin-top:14px}
.pomo-ctrl button{flex:1;font-family:var(--sans);font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--paper-raise);padding:8px;border-radius:8px;cursor:pointer;transition:.15s}
.pomo-ctrl button:hover{border-color:var(--accent);color:var(--accent)}
.pomo-ctrl button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.pomo-meta{font-size:11.5px;color:var(--ink-faint);margin-top:10px}
.pomo-fab{position:fixed;right:22px;bottom:22px;z-index:70;width:52px;height:52px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;cursor:pointer;font-size:22px;box-shadow:var(--shadow-lg);display:grid;place-items:center;transition:.2s}
.pomo-fab:hover{transform:scale(1.06)}
@media(max-width:920px){.pomo{right:14px;bottom:14px;width:200px}.pomo-fab{right:14px;bottom:14px}}

/* ---- Cheatsheet builder ---- */
.cheat-page{background:#fff;color:#111;border:1px solid var(--line);border-radius:8px;padding:20px;margin:18px 0;box-shadow:var(--shadow);column-count:2;column-gap:20px;font-size:12px}
.cheat-item{break-inside:avoid;border:1px solid #e3e3e3;border-radius:7px;padding:8px 10px;margin-bottom:9px;background:#fcfcfa}
.cheat-item .cn{font-family:var(--sans);font-weight:700;font-size:11px;color:#222;display:flex;justify-content:space-between;gap:6px}
.cheat-item .cx{margin-top:5px;color:#111}
.cheat-item .rm{cursor:pointer;color:#b23a48;font-weight:700;font-family:var(--sans)}
.cheat-empty{text-align:center;color:var(--ink-faint);font-family:var(--sans);padding:40px;font-size:15px}

/* ---- Misc ---- */
.toc{position:sticky;top:78px;font-family:var(--sans);font-size:13.5px;display:flex;flex-direction:column;gap:3px}
.toc a{padding:5px 11px;border-radius:7px;color:var(--ink-faint);text-decoration:none;border-left:2px solid transparent;transition:.15s}
.toc a:hover{color:var(--ink);background:var(--paper-raise)}
.with-toc{display:grid;grid-template-columns:1fr 200px;gap:40px;align-items:start}
@media(max-width:1100px){.with-toc{grid-template-columns:1fr}.toc-wrap{display:none}}
.fmt-q{font-family:var(--sans)}
.divider{height:1px;background:var(--line);margin:40px 0;border:none}
.print-btn{font-family:var(--sans);font-weight:600;font-size:14px;background:var(--accent);color:#fff;border:none;padding:11px 20px;border-radius:10px;cursor:pointer}
.seg{display:inline-flex;background:var(--paper-raise);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap}
.seg button{font-family:var(--sans);font-size:13px;font-weight:600;border:none;background:none;color:var(--ink-faint);padding:7px 13px;border-radius:7px;cursor:pointer;transition:.15s}

<body data-theme="light">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

/* =====================================================================
   MATH + DIAGRAM PRIMITIVES
   ===================================================================== */
function Tex({children,block}){
  const ref = useRef(null);
  useEffect(()=>{
    if(ref.current && window.katex){
      try{ window.katex.render(children, ref.current, {displayMode:!!block, throwOnError:false, fleqn:false}); }
      catch(e){ ref.current.textContent = children; }
    }
  },[children,block]);
  return block ? <div className="katex-display-wrap" ref={ref}/> : <span ref={ref}/>;
}

let _mid=0;
function Mermaid({chart}){
  const ref=useRef(null);
  useEffect(()=>{
    let alive=true;
    if(ref.current && window.mermaid){
      const id='mm'+(_mid++);
      window.mermaid.render(id, chart).then(({svg})=>{ if(alive&&ref.current) ref.current.innerHTML=svg; })
        .catch(()=>{ if(ref.current) ref.current.textContent='[diagram]'; });
    }
    return ()=>{alive=false};
  },[chart]);
  return <div className="mermaid" ref={ref}/>;
}

/* =====================================================================
   CUSTOM SVG VISUALIZATIONS
   ===================================================================== */

/* -- 1. Word-embedding 2D plot + live cosine similarity (2024 exam) -- */
function EmbeddingViz(){
  const pts=[
    {w:'Mathematics',x:1.6,y:4.2,c:'#2f5d50'},
    {w:'Statistics',x:2.1,y:3.7,c:'#3f6f8f'},
    {w:'Tiger',x:4.4,y:1.5,c:'#b5781f'},
    {w:'Lion',x:4.7,y:1.0,c:'#b23a48'},
  ];
  const [a,setA]=useState(0),[b,setB]=useState(2);
  const W=360,H=300,pad=34, sx=v=>pad+(v/5)*(W-2*pad), sy=v=>H-pad-(v/5)*(H-2*pad);
  const cos=(p,q)=>{const d=p.x*q.x+p.y*q.y,m=Math.hypot(p.x,p.y)*Math.hypot(q.x,q.y);return d/m;};
  const c=cos(pts[a],pts[b]);
  return(
    <div className="viz">
      <div className="viz-title">📐 Word Embeddings & Cosine Similarity</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:420,display:'block',margin:'0 auto'}}>
        <line x1={pad} y1={H-pad} x2={W-pad} y2={H-pad} stroke="var(--line)"/>
        <line x1={pad} y1={pad} x2={pad} y2={H-pad} stroke="var(--line)"/>
        {pts.map((p,i)=>(
          <g key={i}>
            <line x1={sx(0)} y1={sy(0)} x2={sx(p.x)} y2={sy(p.y)} stroke={p.c} strokeWidth={(i===a||i===b)?3:1.4} opacity={(i===a||i===b)?1:.45} markerEnd="url(#ar)"/>
            <circle cx={sx(p.x)} cy={sy(p.y)} r={6} fill={p.c}/>
            <text x={sx(p.x)+9} y={sy(p.y)+4} fontFamily="var(--sans)" fontSize="12" fill="var(--ink)">{p.w}</text>
          </g>
        ))}
        <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="context-stroke" strokeWidth="1.4"/></marker></defs>
      </svg>
      <div className="ctrl">
        <select value={a} onChange={e=>setA(+e.target.value)} style={{fontFamily:'var(--sans)',padding:'6px 10px',borderRadius:8,border:'1px solid var(--line)',background:'var(--paper-raise)',color:'var(--ink)'}}>
          {pts.map((p,i)=><option key={i} value={i}>{p.w}</option>)}
        </select>
        <span style={{fontFamily:'var(--sans)',color:'var(--ink-faint)'}}>vs</span>
        <select value={b} onChange={e=>setB(+e.target.value)} style={{fontFamily:'var(--sans)',padding:'6px 10px',borderRadius:8,border:'1px solid var(--line)',background:'var(--paper-raise)',color:'var(--ink)'}}>
          {pts.map((p,i)=><option key={i} value={i}>{p.w}</option>)}
        </select>
      </div>
      <div style={{textAlign:'center',fontFamily:'var(--sans)'}}>
        cosine similarity = <b style={{color:c>.8?'var(--good)':'var(--hi)',fontSize:20}}>{c.toFixed(3)}</b>
        <span style={{color:'var(--ink-faint)',fontSize:14}}> &nbsp;({c>.8?'similar meaning → small angle':'different meaning → large angle'})</span>
      </div>
      <div className="viz-cap">Semantically related words point in similar directions. Cosine looks at the <i>angle</i>, not length — that's why it beats Euclidean for text. (From UAS 2024 #3)</div>
    </div>
  );
}

/* -- 2. Centrality interactive graph (UAS 2025 Esai #1, node S) -- */
function CentralityViz(){
  // graph from 2025 exam: nodes P,Q,R,S,T,U,V
  const nodes={P:[210,40],Q:[330,95],R:[195,120],S:[70,110],T:[225,180],U:[70,185],V:[150,235]};
  const edges=[['P','S'],['P','R'],['P','Q'],['S','R'],['S','U'],['S','V'],['R','Q'],['R','T'],['R','U'],['U','T'],['T','Q'],['T','V']];
  const [sel,setSel]=useState('S');
  const deg={}; Object.keys(nodes).forEach(n=>deg[n]=0);
  edges.forEach(([a,b])=>{deg[a]++;deg[b]++;});
  // BFS shortest path length from sel
  const adj={}; Object.keys(nodes).forEach(n=>adj[n]=[]);
  edges.forEach(([a,b])=>{adj[a].push(b);adj[b].push(a);});
  const bfs=(s)=>{const d={[s]:0},q=[s];while(q.length){const u=q.shift();adj[u].forEach(v=>{if(d[v]===undefined){d[v]=d[u]+1;q.push(v);}});}return d;};
  const dist=bfs(sel); const N=Object.keys(nodes).length;
  const sumD=Object.keys(nodes).filter(n=>n!==sel).reduce((s,n)=>s+(dist[n]||0),0);
  const closeNorm=((N-1)/sumD);
  const W=400,H=270;
  return(
    <div className="viz">
      <div className="viz-title">🕸️ Centrality Explorer — click a node</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:480,display:'block',margin:'0 auto'}}>
        {edges.map(([a,b],i)=><line key={i} x1={nodes[a][0]} y1={nodes[a][1]} x2={nodes[b][0]} y2={nodes[b][1]} stroke="var(--line)" strokeWidth={2}/>)}
        {Object.entries(nodes).map(([n,[x,y]])=>{
          const isSel=n===sel; const r=11+deg[n]*1.6;
          return(<g key={n} style={{cursor:'pointer'}} onClick={()=>setSel(n)}>
            <circle cx={x} cy={y} r={r} fill={isSel?'var(--accent)':'var(--accent-soft)'} stroke="var(--accent)" strokeWidth={2}/>
            <text x={x} y={y+4} textAnchor="middle" fontFamily="var(--sans)" fontWeight="700" fontSize="13" fill={isSel?'#fff':'var(--accent)'}>{n}</text>
          </g>);
        })}
      </svg>
      <div className="stat-row" style={{margin:'14px 0 0'}}>
        <div className="stat"><div className="stat-v">{deg[sel]}</div><div className="stat-l">Degree centrality of {sel}</div></div>
        <div className="stat"><div className="stat-v">{closeNorm.toFixed(3)}</div><div className="stat-l">Closeness (normalized)</div></div>
        <div className="stat"><div className="stat-v">{sumD}</div><div className="stat-l">Σ shortest-path lengths</div></div>
      </div>
      <div className="viz-cap">Node size = degree. Closeness(norm) = (N−1)/Σd = {N-1}/{sumD} = {closeNorm.toFixed(3)}. For {sel}, exactly the 2025 exam's worked answer when {sel}=S (0.75). Betweenness needs counting shortest paths *through* the node.</div>
    </div>
  );
}

/* -- 3. Dendrogram (HAC) -- */
function DendroViz(){
  // single-linkage merge order for A(5,4)B(2,2)C(1,3)D(5,5) Euclidean — 2024 exam #4a
  // merges: A-D (1.0), B-C (1.41), {AD}-{BC} (3.16)
  return(
    <div className="viz">
      <div className="viz-title">🌳 Dendrogram — HAC single linkage (Euclidean)</div>
      <svg viewBox="0 0 360 230" style={{width:'100%',maxWidth:420,display:'block',margin:'0 auto'}}>
        {/* y axis */}
        <line x1="40" y1="20" x2="40" y2="190" stroke="var(--line)"/>
        {[0,1,2,3].map(h=>{const y=190-h*52;return(<g key={h}><line x1="36" y1={y} x2="40" y2={y} stroke="var(--ink-faint)"/><text x="30" y={y+4} textAnchor="end" fontSize="11" fontFamily="var(--sans)" fill="var(--ink-faint)">{h}</text></g>);})}
        {/* leaves at x: A=80 D=140 B=210 C=270 */}
        {/* A-D merge at h=1 -> y=138 */}
        <path d="M80,190 L80,138 L140,138 L140,190" fill="none" stroke="var(--accent)" strokeWidth="2.4"/>
        {/* B-C merge at h=1.41 -> y~117 */}
        <path d="M210,190 L210,117 L270,117 L270,190" fill="none" stroke="#3f6f8f" strokeWidth="2.4"/>
        {/* {AD}-{BC} at h=3.16 -> y~25; AD center x=110, BC center x=240 */}
        <path d="M110,138 L110,26 L240,26 L240,117" fill="none" stroke="#b23a48" strokeWidth="2.4"/>
        {[['A',80],['D',140],['B',210],['C',270]].map(([l,x])=><text key={l} x={x} y="205" textAnchor="middle" fontFamily="var(--sans)" fontWeight="700" fontSize="13" fill="var(--ink)">{l}</text>)}
        <text x="200" y="222" textAnchor="middle" fontSize="11" fontFamily="var(--sans)" fill="var(--ink-faint)">merge heights: A–D@1.0, B–C@1.41, {'{AD}'}–{'{BC}'}@3.16</text>
      </svg>
      <div className="viz-cap">Read bottom-up: the <b>lowest</b> bars merge first (most similar). Cutting the tree at a height gives your clusters. (UAS 2024 #4a)</div>
    </div>
  );
}

/* -- 4. CNN convolution demo -- */
function ConvViz(){
  const [k,setK]=useState('edge');
  const img=[[10,10,10,80,80],[10,10,10,80,80],[10,10,10,80,80],[10,10,10,80,80],[10,10,10,80,80]];
  const kernels={edge:[[-1,-1,-1],[-1,8,-1],[-1,-1,-1]],blur:[[1,1,1],[1,1,1],[1,1,1]].map(r=>r.map(v=>v/9)),sharp:[[0,-1,0],[-1,5,-1],[0,-1,0]]};
  const K=kernels[k];
  const out=[];for(let i=0;i<3;i++){out[i]=[];for(let j=0;j<3;j++){let s=0;for(let a=0;a<3;a++)for(let b=0;b<3;b++)s+=img[i+a][j+b]*K[a][b];out[i][j]=Math.round(s);}}
  const cell=(v,mx)=>{const t=Math.max(0,Math.min(1,(v)/(mx||100)));return `rgba(47,93,80,${.12+t*.7})`;};
  return(
    <div className="viz">
      <div className="viz-title">🔲 Convolution — how a CNN "sees" a vertical edge</div>
      <div className="ctrl">
        {Object.keys(kernels).map(kk=><button key={kk} className={k===kk?'on':''} onClick={()=>setK(kk)}>{kk} filter</button>)}
      </div>
      <div style={{display:'flex',gap:18,justifyContent:'center',alignItems:'center',flexWrap:'wrap'}}>
        <Grid m={img} cap="Input 5×5" mx={80}/>
        <span style={{fontSize:22,color:'var(--ink-faint)'}}>✳</span>
        <Grid m={K} cap="Kernel 3×3" k/>
        <span style={{fontSize:22,color:'var(--ink-faint)'}}>=</span>
        <Grid m={out} cap="Feature map 3×3" mx={Math.max(...out.flat().map(Math.abs))}/>
      </div>
      <div className="viz-cap">A kernel slides over the image; each output = Σ(overlap × kernel). The <b>edge</b> filter lights up exactly where pixels change (the boundary 10→80). Output size = (5−3)+1 = 3. Stack many filters → deep features.</div>
    </div>
  );
}
function Grid({m,cap,mx=100,k}){
  return(<div style={{textAlign:'center'}}>
    <div style={{display:'grid',gridTemplateColumns:`repeat(${m[0].length},1fr)`,gap:2}}>
      {m.flat().map((v,i)=><div key={i} style={{width:k?30:26,height:k?30:26,display:'grid',placeItems:'center',fontFamily:'var(--mono)',fontSize:k?11:10.5,borderRadius:4,background:k?'var(--gold-soft)':`rgba(47,93,80,${.1+Math.min(1,Math.abs(v)/mx)*.7})`,color:k?'var(--gold)':(Math.abs(v)/mx>.5?'#fff':'var(--ink)')}}>{k?(+v).toFixed(v%1?1:0):v}</div>)}
    </div>
    <div style={{fontFamily:'var(--sans)',fontSize:11.5,color:'var(--ink-faint)',marginTop:6}}>{cap}</div>
  </div>);
}

/* -- 5. Confusion matrix → precision / recall / F1 -- */
function MetricsViz(){
  const [tp,setTp]=useState(40),[fp,setFp]=useState(10),[fn,setFn]=useState(60),[tn,setTn]=useState(390);
  const P=tp/(tp+fp||1), R=tp/(tp+fn||1), F1=2*P*R/((P+R)||1);
  const cellS={padding:'14px',textAlign:'center',fontFamily:'var(--sans)',borderRadius:10};
  return(
    <div className="viz">
      <div className="viz-title">🎯 Confusion Matrix → Precision / Recall / F1</div>
      <div style={{display:'grid',gridTemplateColumns:'80px 1fr 1fr',gap:8,maxWidth:420,margin:'0 auto'}}>
        <div></div><div style={{...cellS,fontWeight:700,color:'var(--ink-faint)',fontSize:12}}>Pred +</div><div style={{...cellS,fontWeight:700,color:'var(--ink-faint)',fontSize:12}}>Pred −</div>
        <div style={{...cellS,fontWeight:700,color:'var(--ink-faint)',fontSize:12,display:'grid',placeItems:'center'}}>Actual +</div>
        <Edt v={tp} set={setTp} bg="var(--good-soft)" lab="TP"/>
        <Edt v={fn} set={setFn} bg="var(--hi-soft)" lab="FN"/>
        <div style={{...cellS,fontWeight:700,color:'var(--ink-faint)',fontSize:12,display:'grid',placeItems:'center'}}>Actual −</div>
        <Edt v={fp} set={setFp} bg="var(--med-soft)" lab="FP"/>
        <Edt v={tn} set={setTn} bg="var(--paper-raise)" lab="TN"/>
      </div>
      <div className="stat-row" style={{margin:'16px 0 0'}}>
        <div className="stat"><div className="stat-v">{P.toFixed(2)}</div><div className="stat-l">Precision = TP/(TP+FP)</div></div>
        <div className="stat"><div className="stat-v">{R.toFixed(2)}</div><div className="stat-l">Recall = TP/(TP+FN)</div></div>
        <div className="stat"><div className="stat-v" style={{color:'var(--accent)'}}>{F1.toFixed(2)}</div><div className="stat-l">F1 = 2PR/(P+R)</div></div>
      </div>
      <div className="viz-cap">Edit the cells. Precision = "of what I flagged, how much was right." Recall = "of all real positives, how many did I catch." F1 = their harmonic mean. (UAS 2025: P=.8,R=.4 → F1=.53)</div>
    </div>
  );
}
function Edt({v,set,bg,lab}){
  return(<div style={{background:bg,borderRadius:10,padding:'10px',textAlign:'center'}}>
    <div style={{fontFamily:'var(--sans)',fontSize:10.5,fontWeight:700,color:'var(--ink-faint)'}}>{lab}</div>
    <input type="number" value={v} onChange={e=>set(Math.max(0,+e.target.value||0))} style={{width:'70px',textAlign:'center',fontFamily:'var(--mono)',fontSize:18,fontWeight:600,border:'none',background:'none',color:'var(--ink)'}}/>
  </div>);
}

/* -- 6. Time-series decomposition -- */
function TSViz(){
  const [mode,setMode]=useState('mult');
  const n=48, data=[];
  for(let t=0;t<n;t++){const trend=10+t*0.4;const seas=Math.sin(t/12*2*Math.PI);const amp=mode==='mult'?(1+t*0.06):3;data.push(trend+seas*amp);}
  const W=420,H=170,pad=24, mn=Math.min(...data),mx=Math.max(...data);
  const sx=i=>pad+(i/(n-1))*(W-2*pad), sy=v=>H-pad-((v-mn)/(mx-mn))*(H-2*pad);
  const path=data.map((v,i)=>`${i?'L':'M'}${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(' ');
  const trendPath=data.map((v,i)=>`${i?'L':'M'}${sx(i).toFixed(1)},${sy(10+i*0.4).toFixed(1)}`).join(' ');
  return(
    <div className="viz">
      <div className="viz-title">📈 Time-Series Decomposition</div>
      <div className="ctrl">
        <button className={mode==='add'?'on':''} onClick={()=>setMode('add')}>Additive (constant amplitude)</button>
        <button className={mode==='mult'?'on':''} onClick={()=>setMode('mult')}>Multiplicative (growing)</button>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:480,display:'block',margin:'0 auto'}}>
        <path d={trendPath} fill="none" stroke="var(--gold)" strokeWidth="2" strokeDasharray="5 4"/>
        <path d={path} fill="none" stroke="var(--accent)" strokeWidth="2.4"/>
      </svg>
      <div className="viz-cap"><b style={{color:'var(--gold)'}}>Trend</b> (dashed) + <b style={{color:'var(--accent)'}}>seasonality</b> + noise. If seasonal swings <b>grow</b> with the trend → <b>multiplicative</b>; if constant → <b>additive</b>. Every series always has <b>level + noise</b>. (UAS 2025 PG#8, Isian#5)</div>
    </div>
  );
}

/* -- 7. CLIP contrastive matrix (VLM) -- */
function ClipViz(){
  const imgs=['🐶 dog','🐱 cat','🚗 car'];const txts=['"a photo of a dog"','"a photo of a cat"','"a photo of a car"'];
  const sim=[[.92,.21,.08],[.18,.90,.12],[.05,.10,.94]];
  return(
    <div className="viz">
      <div className="viz-title">🔗 CLIP — contrastive image–text matching</div>
      <div style={{overflowX:'auto'}}>
      <table className="dm" style={{maxWidth:480,margin:'0 auto'}}>
        <thead><tr><th></th>{txts.map((t,i)=><th key={i} style={{fontSize:11}}>{t}</th>)}</tr></thead>
        <tbody>{imgs.map((im,i)=><tr key={i}><th>{im}</th>{sim[i].map((s,j)=><td key={j} style={{background:`rgba(47,93,80,${s})`,color:s>.5?'#fff':'var(--ink-soft)',fontWeight:i===j?700:400}}>{s.toFixed(2)}</td>)}</tr>)}</tbody>
      </table></div>
      <div className="viz-cap">CLIP trains image & text encoders so that <b>matching</b> pairs (diagonal) have high cosine similarity and mismatches are low. This is what enables <b>zero-shot</b>: classify a new image by comparing it to text prompts you write on the spot. (W12 / lecture14-vlm)</div>
    </div>
  );
}

/* -- 8. TF-IDF mini calculator -- */
function TfidfViz(){
  const docs=[['the','cat','sat','on','the','mat'],['the','dog','ate','the','bone'],['cat','and','dog','play']];
  const [term,setTerm]=useState('cat');
  const N=docs.length;
  const tf=docs.map(d=>d.filter(w=>w===term).length/d.length);
  const df=docs.filter(d=>d.includes(term)).length;
  const idf=Math.log(N/(df||1));
  return(
    <div className="viz">
      <div className="viz-title">🔤 TF-IDF Calculator</div>
      <div className="ctrl">
        <span style={{fontFamily:'var(--sans)',color:'var(--ink-faint)'}}>term:</span>
        {['the','cat','dog','bone'].map(t=><button key={t} className={term===t?'on':''} onClick={()=>setTerm(t)}>{t}</button>)}
      </div>
      <table className="dm" style={{maxWidth:520,margin:'0 auto'}}>
        <thead><tr><th>Doc</th><th>TF</th><th>contains "{term}"?</th><th>TF·IDF</th></tr></thead>
        <tbody>{docs.map((d,i)=><tr key={i}><td style={{textAlign:'left',fontFamily:'var(--mono)',fontSize:12}}>{d.join(' ')}</td><td>{tf[i].toFixed(2)}</td><td>{d.includes(term)?'✓':'—'}</td><td style={{fontWeight:700,color:'var(--accent)'}}>{(tf[i]*idf).toFixed(3)}</td></tr>)}</tbody>
      </table>
      <div style={{textAlign:'center',fontFamily:'var(--sans)',fontSize:14,color:'var(--ink-faint)'}}>IDF = log(N/df) = log({N}/{df}) = <b style={{color:'var(--ink)'}}>{idf.toFixed(3)}</b></div>
      <div className="viz-cap">TF-IDF = how often a word appears <i>here</i> (TF) × how <i>rare</i> it is overall (IDF). Common words like "the" (in every doc) get IDF≈0 → killed. Rare, document-specific words score high.</div>
    </div>
  );
}

  bigPicture:'A **graph** $G=(V,E)$ is a set of **nodes** (vertices = entities, e.g. people, papers, suspects) joined by **edges** (links = relationships). The lecture literally opened with a real corruption network from Wikidata: people as nodes, "is-a-person" / "friend-of" / "bribed" as labelled edges. Graph mining asks three questions: (1) **who matters?** → *centrality*; (2) **what groups exist?** → *community detection*; (3) **what sub-patterns recur?** → *frequent subgraph mining*.',
  concepts:[
    {n:'Centrality — "who is important?"', tl:'4 flavours, each a different definition of "important"',
     body:[
       'Centrality scores how important a node is. There are four you must know cold:',
       '**Degree centrality** = how many edges a node has. Raw popularity. Normalized: divide by $N-1$ (max possible neighbours).',
       '**Closeness centrality** = how *close* a node is to everyone else. $C_{close}(v)=\\dfrac{N-1}{\\sum_{u}d(v,u)}$ where $d$ is shortest-path length. High closeness = can reach the whole network in few hops.',
       '**Betweenness centrality** = how often a node sits *on the shortest path between other pairs*. $C_{btw}(v)=\\sum_{s\\ne v\\ne t}\\dfrac{\\sigma_{st}(v)}{\\sigma_{st}}$ — a **bridge/broker**. Normalize by dividing by $\\binom{N-1}{2}$.',
       '**Eigenvector centrality** = you are important if your *neighbours* are important (the idea behind PageRank).',
       'The 2025 exam (PG#5) tested the key intuition: a node with **high betweenness but low degree** is a **bridge between communities** — few connections, but every shortest path runs through it. Removing it disconnects the network.'
     ],
     mnemonic:'DCBE — Degree(count), Closeness(reach), Betweenness(bridge), Eigenvector(prestige).',
     viz:'CentralityViz'},
    {n:'Community detection — "what groups exist?"', tl:'Find densely-connected clusters of nodes (it\'s basically clustering on graphs)',
     body:[
       'A **community** = a group of nodes that are densely connected to each other (or share similar interests/similarity) more than to the rest of the graph — a criminal cell, a friend group, a research field. **Think of it as clustering, but on a graph.** UAS 2024 Q1 asked you to define this + a law-enforcement use: detecting a **money-laundering ring** as a tightly-knit community of accounts moving funds among themselves.',
       '**Modularity $Q$** is the main concept — the quality score for how *well-separated* the groups are. High $Q$ = many edges fall *inside* communities, few cross between them. $Q=\\frac{1}{2m}\\sum_{ij}\\big(A_{ij}-\\frac{k_ik_j}{2m}\\big)\\delta(c_i,c_j)$ (note it uses each node\'s **degree** $k_i$). It plays the same role here that **silhouette score / Davies–Bouldin** play in ordinary clustering: a number telling you how good the grouping is.',
       '**Girvan–Newman** (divisive, top-down): compute **edge betweenness** for every edge, **cut the highest one** (a "bridge", e.g. a–b) to split the graph, then **recompute betweenness on the already-cut graph** and repeat — peeling off communities iteratively. (2025 PG#6 answer = "remove the edge with highest edge betweenness".) Accurate but slow: $O(m^2n)$.',
       '**Louvain** (agglomerative, bottom-up, greedy): start with every node its own community; **iteratively** move each node to whichever neighbour-community raises **modularity $Q$** most (the calculation uses node **degrees**); then collapse each community into a super-node and repeat. Fast, scales to millions of nodes. **Weakness:** can produce **badly-connected (even internally disconnected) communities.**',
       '**Leiden** = Louvain + an extra **refinement** step in the middle, where node moving is only done **within the same community** — this *guarantees every community stays internally connected* and gives better, more stable partitions. Remember Leiden as "Louvain + a connectivity guarantee."'
     ],
     mnemonic:'Modularity = silhouette-score-for-graphs. Girvan-Newman CUTS highest-betweenness edges (recompute each round); Louvain GROWS communities by max-ΔQ (uses degree); Leiden = Louvain + refinement (move only within same community) → never disconnected.',
     viz:null},
    {n:'Frequent subgraph mining — "what patterns recur?"', tl:'Find sub-structures appearing in many graphs',
     body:[
       'Given a database of many graphs (e.g. thousands of molecules), find **subgraphs that appear at least `minsup` times**. The threshold is called **minimum support / minsup** — that exact term was the 2025 Isian#4 answer.',
       'Use cases: a recurring ring structure in chemistry → a drug candidate; a repeated interaction pattern in a social network. The classic algorithm is **gSpan** (uses a canonical DFS code so it never counts the same subgraph twice).',
       'The hard part is **subgraph isomorphism** (checking whether a pattern occurs) — NP-hard, which is why these algorithms lean on clever canonical encodings and pruning (anti-monotonicity: if a subgraph is infrequent, none of its supergraphs can be frequent).'
     ],
     mnemonic:'Frequent subgraph = "appears ≥ minsup times". minsup = the bar.',
     viz:null},
    {n:'Graph embeddings', tl:'Turn graph structure into vectors',
     body:[
       '**Graph embeddings** map nodes (or whole graphs) into a **vector space** (2025 PG#7 answer = "ruang vektor / vector space"), preserving relational + structural information so you can feed graphs into ordinary ML models. node2vec / DeepWalk do random walks and treat them like "sentences" of nodes (reusing the word2vec trick).'
     ]}
  ],
  pipeline:'graph TD\n  A["Raw network<br/>(nodes + edges)"] --> B[Centrality<br/>who matters]\n  A --> C[Community detection<br/>Louvain / Leiden / Girvan-Newman]\n  A --> D[Frequent subgraph<br/>minsup, gSpan]\n  A --> E[Graph embedding<br/>→ vectors]\n  E --> F[Downstream ML]',
  formulas:[
    {n:'Degree centrality (normalized)', tex:'C_{deg}(v)=\\dfrac{\\deg(v)}{N-1}', when:'Raw connection count, scaled 0–1.'},
    {n:'Closeness centrality (normalized)', tex:'C_{close}(v)=\\dfrac{N-1}{\\sum_{u\\ne v} d(v,u)}', when:'Inverse mean shortest-path distance. 2025 Esai1: S → 6/8 = 0.75.'},
    {n:'Betweenness centrality (normalized)', tex:'C_{btw}(v)=\\dfrac{1}{\\binom{N-1}{2}}\\sum_{s\\ne v\\ne t}\\dfrac{\\sigma_{st}(v)}{\\sigma_{st}}', when:'Fraction of shortest paths through v. σ=#shortest paths.'},
    {n:'Modularity', tex:'Q=\\dfrac{1}{2m}\\sum_{ij}\\Big(A_{ij}-\\dfrac{k_i k_j}{2m}\\Big)\\delta(c_i,c_j)', when:'Quality of a community partition; Louvain/Leiden maximize it.'}
  ],
  mnemonics:[
    {phrase:'"Bridges have high BETWEENNESS, low degree"', expands:'The lonely broker connecting two worlds — 2025 PG#5.'},
    {phrase:'"Leiden = Louvain + connectivity guarantee"', expands:'Both maximize modularity; Leiden fixes Louvain\'s disconnected-community bug.'}
  ],
  pitfalls:[
    'Closeness uses **shortest-path distance**, not edge count — count hops via BFS.',
    'Girvan–Newman removes **edges** by *edge* betweenness (not nodes!).',
    'Don\'t confuse **degree** (local count) with **betweenness** (global bridging). The exam loves this trap.'
  ],
  summary:[
    'Graph = nodes (entities) + edges (relations).',
    'Centrality: Degree (count) · Closeness (reach, (N−1)/Σd) · Betweenness (bridge) · Eigenvector (prestige).',
    'Community: Girvan–Newman (cut high-betweenness edges) · Louvain (greedy modularity) · Leiden (Louvain + connected guarantee). Quality = modularity Q.',
    'Frequent subgraph mining: pattern appears ≥ minsup. gSpan.',
    'Graph embeddings → vector space for downstream ML.'
  ]
},
/* ========================= 2. TEXT & WEB MINING ========================= */
{
  id:'text', title:'Text & Web Mining', icon:'📝', weight:'hi',
  examTag:'Heaviest topic: preprocessing, TF-IDF, embeddings, cosine, F1, web-scraping ethics',
  dek:'From raw strings to vectors: how machines read, compare, classify and generate text — plus how to scrape the web ethically.',
  readTime:14,
  source:'Classical Text Mining · Feature Engineering for Text · GenAI Era · GenAI+LLM · UAS 2024 Q3,5,9 · UAS 2025 PG1-4, Isian1-3, Esai2',
  bigPicture:'Computers can\'t do math on words, so **text mining = turn text into numbers, then mine**. The pipeline: **preprocess** (clean) → **represent** (vectorize: BoW, TF-IDF, embeddings) → **mine** (classify, cluster, similarity) → optionally **generate** (LLMs). **Web mining** is text mining where your corpus is the live web, adding crawling/scraping (and its ethics).',
  concepts:[
    {n:'Preprocessing pipeline', tl:'Normalize messy text into clean tokens',
     body:[
       'Standard steps, in order: **Tokenization** (split into words/tokens) → **case-folding** (lowercase) → **stopword removal** (drop "the", "and") → **stemming** (chop to root: "running"→"run", crude) **or lemmatization** (dictionary root: "better"→"good", smart) → optionally **n-grams** (keep 2-word "bigram" phrases).',
       '**POS tagging** = label each token with its part of speech (noun/verb/adj/proper-noun). 2025 Isian#2 worked example: *"kue pedas disukai Gibran"* → kue=**NOUN**, pedas=**ADJ**, disukai=**VERB**, Gibran=**PROPN**. (PG#4: the *task* of labelling word classes per token = **POS tagging**.)'
     ],
     mnemonic:'TLSSN: Tokenize → Lowercase → Stopwords → Stem/Lemmatize → N-grams.',
     viz:null},
    {n:'Parsing: constituency vs dependency', tl:'Two ways to expose sentence structure',
     body:[
       '**Constituency parsing** asks *"what are the meaningful groups of words and how are they nested?"* — it builds a tree of phrases (NP, VP…). **Dependency parsing** asks *"which words depend on which other words, and what is the nature of that dependency?"* — it links each word to its head (subject→verb, etc.). That phrasing is verbatim the 2025 Isian#3 answer.'
     ],
     mnemonic:'Constituency = phrase BOXES (nesting). Dependency = ARROWS between words (head→dependent).'},
    {n:'Representations: BoW → TF-IDF → Embeddings', tl:'The core vectorization ladder',
     body:[
       '**Bag of Words (BoW):** count each word. Ignores order, huge & **sparse**, every word equally important — bad.',
       '**TF-IDF:** weight = **TF** (how often a word appears in *this* doc) × **IDF** $=\\log\\frac{N}{df}$ (how *rare* it is across all docs). Common words (high df) get IDF≈0 and vanish; rare, document-specific words score high. Still sparse, still no meaning.',
       '**Word embeddings (Word2Vec, GloVe):** learn a **dense, low-dimensional** vector per word so that **similar meanings → nearby vectors**. UAS 2024 Q3 is the canonical picture: *Mathematics & Statistics* point the same way, *Tiger & Lion* point another way — the model learned this from **words sharing contexts** ("you shall know a word by the company it keeps"). 2025 Esai2c lists the benefits: captures **semantic meaning**, **lowers dimensionality** vs one-hot, **improves classifier accuracy/generalization**.',
       '**Sentence / document embeddings:** combine word vectors into one. The simplest valid strategy (2025 Esai2d answer) = **average all the word embeddings** in the document. Better: models like Sentence-BERT.'
     ],
     mnemonic:'BoW counts · TF-IDF weights by rarity · Embeddings capture MEANING.',
     viz:'TfidfViz'},
    {n:'Cosine similarity', tl:'Compare two vectors by ANGLE, not length',
     body:[
       'Once text is vectors, **cosine similarity** measures how alike two docs/words are: $\\cos\\theta=\\dfrac{\\mathbf{a}\\cdot\\mathbf{b}}{\\lVert\\mathbf{a}\\rVert\\,\\lVert\\mathbf{b}\\rVert}$. It uses the **angle**, so a long document and a short one on the same topic still score high (length-invariant) — which is exactly why text people prefer it over Euclidean distance.',
       'Range: 1 = identical direction (same topic), 0 = orthogonal (unrelated), −1 = opposite.'
     ],
     viz:'EmbeddingViz'},
    {n:'Text classification & evaluation', tl:'Predict a label; measure with P/R/F1',
     body:[
       'Feed embeddings/TF-IDF into a classifier (Naive Bayes, SVM, neural net) to predict labels (spam/ham, sentiment). Embeddings help because they **inject semantics** and **reduce dimensionality** (2025 Esai2c).',
       'Evaluate with **Precision** = TP/(TP+FP) (of what I flagged, how much was right), **Recall** = TP/(TP+FN) (of all true positives, how many I caught), and **F1** = harmonic mean $=\\frac{2PR}{P+R}$. 2025 Esai2e: P=0.8, R=0.4 → F1 = 2(0.8)(0.4)/(1.2) = **0.53**.'
     ],
     viz:'MetricsViz'},
    {n:'Web mining & scraping ethics', tl:'Text mining on the live web',
     body:[
       '**Web scraping** with e.g. BeautifulSoup: `requests.get(url)` → `soup = BeautifulSoup(html)` → `soup.find(tag)` returns the **first matching element with its contents** (2025 Esai2a). Setting a **User-Agent** header **disguises the request to look like a real browser** rather than a bot/script (2025 Esai2b).',
       'UAS 2024 Q5 — challenges of web mining vs plain text mining: (1) **unstructured & inconsistent HTML/markup**, (2) **massive scale + dynamic/JS content**, (3) **noise** (ads, navbars), (4) **legal/ethical limits** (robots.txt, rate-limits).',
       '**Ethics (2025 PG#3):** scraping is ethical if you don\'t overload the server, you respect `robots.txt`, you take only public/non-auth data, and you **attribute the source**. *Using scraped data commercially without crediting the source* is the **unethical** option.'
     ]},
    {n:'LLMs & Generative AI for text', tl:'The modern frontier',
     body:[
       '**LLMs** (GPT-family) are huge transformer models trained to predict the next token; they enable **GenAI** for summarization, Q&A, translation, code. UAS 2024 Q9 tests **prompt quality**: a **low-quality** prompt is vague ("write about marketing"); a **high-quality** prompt gives **role, context, task, format, constraints** ("You are a B2B copywriter. Write a 100-word LinkedIn post for a SaaS launch targeting CTOs, friendly tone, one CTA").',
       'Key vocabulary: **zero-shot** (no examples), **few-shot** (a few examples in the prompt), **hallucination** (confident wrong output), **RAG** (ground the LLM on retrieved documents to reduce hallucination).'
     ],
     mnemonic:'Good prompt = Role + Context + Task + Format + Constraints (RCTFC).'}
  ],
  pipeline:'graph LR\n  A[Raw text/web] --> B[Preprocess<br/>tokenize·stopword·stem·POS]\n  B --> C[Represent<br/>BoW · TF-IDF · embeddings]\n  C --> D{Mine}\n  D --> E[Classify<br/>P/R/F1]\n  D --> F[Cluster]\n  D --> G[Cosine similarity]\n  C --> H[LLM / GenAI]',
  formulas:[
    {n:'TF-IDF', tex:'w_{t,d}=\\underbrace{\\mathrm{tf}(t,d)}_{\\text{freq here}}\\times\\underbrace{\\log\\dfrac{N}{df_t}}_{\\text{rarity (IDF)}}', when:'Down-weights common words, up-weights rare informative ones.'},
    {n:'Cosine similarity', tex:'\\cos\\theta=\\dfrac{\\mathbf{a}\\cdot\\mathbf{b}}{\\lVert\\mathbf{a}\\rVert\\lVert\\mathbf{b}\\rVert}=\\dfrac{\\sum a_i b_i}{\\sqrt{\\sum a_i^2}\\sqrt{\\sum b_i^2}}', when:'Length-invariant text similarity. 1=same, 0=unrelated.'},
    {n:'Precision / Recall / F1', tex:'P=\\dfrac{TP}{TP+FP},\\;\\; R=\\dfrac{TP}{TP+FN},\\;\\; F1=\\dfrac{2PR}{P+R}', when:'Classifier eval. P=.8,R=.4→F1=.53 (2025 Esai2e).'}
  ],
  mnemonics:[

    {phrase:'"Cosine = angle, not length"', expands:'Why it beats Euclidean for documents of different sizes.'},

  bigPicture:'Images, audio and video are just **numbers in disguise**. The job is always: **digital representation → feature extraction → model → task**. An **image** = a grid of pixels (H×W×channels; grayscale=1, RGB=3, each 0–255). **Audio** = a 1-D waveform sampled over time. **Video** = a stack of image frames + an audio track. Deep learning (CNNs) learns the features automatically instead of hand-crafting them.',
  concepts:[

     body:[
       'An image is a **matrix of pixels**. Grayscale = one value per pixel (0=black…255=white). **RGB** = 3 channels (red, green, blue) stacked → shape **H×W×3**. More pixels = higher resolution = more detail + more compute.',
       '(GIS tie-in from 2025 PG#1: a **raster** image stores data in a **cell/grid of pixels** and gets **blurry when zoomed**; a **vector** image uses **mathematical equations** for lines/shapes and stays sharp — SHP is a vector format.)'

    {n:'Global vs local features: FFT vs LBP', tl:'Two ways to extract hand-crafted features',

       'Classic computer vision distinguishes **global** features (describe the whole image) from **local** features (describe small patches).',
       '**FFT (global):** the Fourier Transform converts the image from the **spatial domain to the frequency domain**, capturing overall structure as a sum of sinusoids. It is roughly **translation-invariant** — shifting the object barely changes the FFT magnitude.',
       '**LBP — Local Binary Pattern (local):** captures **local texture** by comparing each pixel to its 8 neighbours. Rule: neighbour $\\ge$ centre → **1**, else **0**; read the 8 bits in a fixed order (e.g. clockwise from top-left) → an 8-bit binary → convert to decimal. Very sensitive to micro-patterns: cracks, edges, surface texture.',
       'Worked (from your asistensi): centre = 75, image rows $[85,90,70],[65,75,80],[60,72,88]$, clockwise from top-left → $1,1,0,1,1,0,0,0$ = `11011000` = $128+64+16+8 =$ **216**.'

       'Two efficiency tricks vs a dense MLP: **Sparse connectivity** — each output connects only to a small **local receptive field** (kernel-sized region), not every input pixel. **Parameter sharing** — the *same* filter weights are reused across all spatial positions. Together → **far fewer parameters** than a fully-connected net, plus translation tolerance.',
       '**Pooling** (e.g. **max-pooling**) shrinks feature maps → fewer params, robustness. 2×2 max-pool stride 2 on a 4×4 → 2×2: take the max of each non-overlapping 2×2 block. The big CNN win: **automatic feature extraction** — no hand-engineering.'

    {n:'Classic ML vs Deep Learning pipeline', tl:'Hand-designed features vs learned features',

    {n:'Audio: signal, sampling & frequency domain', tl:'Why sound is numbers, and why we go to the frequency domain',
     body:[
       'Sound is **energy as vibrations** that propagate **through a medium** — so it **cannot travel in a vacuum** (no medium to carry the vibration). We **sample** the continuous wave (e.g. 44.1 kHz) into a 1-D **waveform** (amplitude over time). **Nyquist:** sample at ≥ **2× the highest frequency** you want to keep, or you get aliasing.',
       'A complex signal = a **sum of simpler frequencies** (music analogy: **Bass** = low freq / slow changes, **Melody** = mid freq, **Noise** = high freq / fast changes).',

       'In FFT code, `mask = freqs > 0` keeps only **positive frequencies** (FFT returns a mirrored negative half you discard); `np.abs(fft)` takes the **magnitude** because FFT outputs **complex numbers**. e.g. signal $[1,2,1,-1]$ → FFT $[3,\\,-3j,\\,-1,\\,3j]$ → magnitude $[3,3,1,3]$.',
       'Run many FFTs over **small time windows** → a **spectrogram** (time × frequency × energy). A spectrogram is essentially a **2-D image of sound**, which is exactly why **CNNs** work so well on audio.'
     ],
     mnemonic:'No medium → no sound (vacuum). Nyquist fs≥2·fmax. Time=what happens, Freq=how often. FFT: mask>0 (positive freqs), np.abs (magnitude). Spectrogram = image of sound → CNN.',

    {n:'Audio features: MFCC, centroid, ZCR, chroma, filters', tl:'The hand-crafted audio feature zoo',
     body:[

       '**Spectral Centroid (brightness):** the "**centre of mass**" / mean frequency of the spectrum (the frequency-domain analogue of **RMSE**). **High** centroid = bright/sharp sound (breaking glass, high trumpet, worn brakes); **low** = dull/soft (leftmost piano keys, distant thunder).',
       '**Zero-Crossing Rate (ZCR):** how often the signal **changes sign**; indicates **roughness/noisiness**. Use cases: **speech vs music** detection, **voiced vs unvoiced** speech (voiced is smoother → lower ZCR), noise detection.',
       '**Chroma features (Pitch Class Profiles):** energy of the **12 musical pitch classes** (C, C#, … B) ignoring octave. **Octave invariance** = the same note in any octave is summed into one pitch class.',

    {n:'Video mining: redundancy, background subtraction, tracking', tl:'The temporal dimension',

       '**Background Subtraction** exploits this: build a **static background model**, subtract it from each new frame → unchanged (redundant) pixels become **0 (black)**, only moving pixels survive. Output = a **binary mask**: **white = moving object (foreground)**, **black = static background**. The white blobs are the **Region of Interest (ROI)** — the dynamic info (people, vehicles) data mining actually cares about.',
       '**Object tracking** estimates future positions with stochastic filters. **Kalman Filter:** assumes **Gaussian** noise, a **linear** motion model, state = a single Gaussian (mean+covariance) → best for **linear, smooth** motion (a car cruising on a highway). **Particle Filter:** **no** strong noise assumption (handles non-Gaussian), handles **non-linear** motion, state = many random **particles** → best for **erratic, non-linear** motion (a billiard ball bouncing randomly).',

   tip:'Edge betweenness (for cutting) vs node betweenness (for ranking nodes) — same idea, different object.'},

  {id:'p8', topic:'cluster', type:'concept', diff:'med', source:'UAS 2024 · Q2',
   q:'Explain how **DBSCAN** can be used to **detect outliers**.',
   steps:['DBSCAN labels points as core (≥minPts within ε), border, or noise.','Outliers fall in **low-density** regions: too few neighbours within ε.','They\'re unreachable from any core point, so DBSCAN tags them **noise**.','Those noise points ARE the outliers — detected automatically, no k or threshold per-point needed.'],
   answer:'Points in sparse neighbourhoods (not density-reachable from any core point) are labelled **noise** = outliers.',
   tip:'This is DBSCAN\'s superpower vs k-means: it refuses to force outliers into clusters.'},

  {id:'p9', topic:'text', type:'concept', diff:'easy', source:'UAS 2024 · Q3',
   q:'How can **word embeddings** produce vectors where *Mathematics≈Statistics* and *Tiger≈Lion* but the two pairs point differently?',
   steps:['Embeddings are learned from **context** — "you shall know a word by the company it keeps."','Mathematics & Statistics co-occur with similar words (data, equation, probability) → similar vectors.','Tiger & Lion co-occur with (jungle, predator, animal) → similar to each other, different region.','So semantic similarity becomes geometric closeness; cosine similarity is high within a pair, low across.'],
   answer:'Distributional training places words with similar contexts near each other in vector space → the two themed pairs cluster in different directions.',
   tip:'This is the distributional hypothesis. Cosine similarity reads the angle between these learned vectors.'},

  {id:'p10', topic:'ts', type:'compute', diff:'med', source:'UAS 2024 · Q6',
   q:'Compute **MAE, RMSE, MAPE** for Technique A and B (5 days). Which is better?',
   given:'Date  Actual  Pred-A  Pred-B\n5/20   20     20     20\n5/21   23     33     26\n5/22   21     21     25\n5/23   25     25     26\n5/24   24     24     22',
   steps:['Errors A: 0,−10,0,0,0 → |e|:0,10,0,0,0. MAE_A=10/5=2.0; RMSE_A=√(100/5)=√20≈4.47; MAPE_A=(10/23)/5×100≈8.7%.','Errors B: 0,+3,+4,+1,−2 → |e|:0,3,4,1,2 sum=10. MAE_B=10/5=2.0.','RMSE_B=√((0+9+16+1+4)/5)=√(30/5)=√6≈2.45.','MAPE_B=(0+3/23+4/21+1/25+2/24)/5×100≈(0+.130+.190+.040+.083)/5×100≈8.9%.'],
   answer:'MAE tie (2.0). RMSE: A≈4.47 vs B≈2.45 → **B better** (A made one huge 10-error that RMSE punishes).',
   tip:'Equal MAE but different RMSE shows RMSE\'s sensitivity to a single large error — A\'s one 10-miss.'},

  {id:'p11', topic:'media', type:'concept', diff:'med', source:'Derived · CNN/W10',
   q:'A 5×5 grayscale image is convolved with a 3×3 kernel, stride 1, no padding. What is the **output feature-map size**, and what does an **edge kernel** detect?',
   steps:['Output size = (W−K+2P)/S + 1 = (5−3+0)/1 + 1 = **3×3**.','An edge kernel has a positive centre and negative surround (sums to ~0).','On flat regions the responses cancel → ~0; at a brightness change the imbalance → large response.','So it lights up exactly at boundaries (edges).'],
   answer:'3×3 feature map; the edge kernel responds strongly where pixel intensity changes (edges), ~0 on flat areas.',
   tip:'Conv output formula and "edges = where the kernel response spikes" are both easy exam points.'},

  {id:'p12', topic:'vlm', type:'concept', diff:'med', source:'Derived · W12/VLM',
   q:'Explain how **CLIP** enables **zero-shot** image classification.',
   steps:['CLIP trains image & text encoders contrastively → matching image-text pairs land close in a **shared embedding space**.','At test time, embed the image once.','Write text prompts for each candidate class: "a photo of a {dog/cat/car}", embed each.','Pick the class whose prompt has the **highest cosine similarity** to the image — no training on those classes needed.'],
   answer:'Embed image + each class prompt in CLIP\'s shared space; predict argmax cosine similarity. Zero training examples required.',
   tip:'Zero-shot = swap "train a classifier" for "write the classes as text and compare." Prompt wording matters.'},

  {id:'p13', topic:'text', type:'concept', diff:'easy', source:'UAS 2025 · PG3',
   q:'Web scraping is considered **ethical** under all these conditions EXCEPT one. Which is unethical?',
   steps:['Ethical: don\'t overload the server (reasonable request rate).','Ethical: obey the site\'s robots.txt.','Ethical: take only public data not behind auth.','Ethical: attribute the source when republishing. UNETHICAL: use the data commercially WITHOUT crediting the source.'],
   answer:'Using scraped data for commercial purposes **without attributing the source** is the unethical option.',
   tip:'The ethics checklist: rate-limit · robots.txt · public-only · attribute.'},

  {id:'p14', topic:'ts', type:'concept', diff:'med', source:'UAS 2025 · Isian 6 & PG8',
   q:'(a) A series\' oscillations shrink over time — is it stationary? (b) Seasonal swings GROW with the trend — additive or multiplicative?',
   steps:['(a) Stationarity needs constant mean AND constant variance.','Shrinking oscillations = changing (non-constant) variance, even if mean is flat → **NOT stationary**.','(b) Growing seasonal amplitude with level → **multiplicative** decomposition (y = T×S×N).'],
   answer:'(a) Not stationary (variance changes). (b) Multiplicative.',
   tip:'Always check BOTH mean and variance for stationarity. Growing swings = multiplicative; constant swings = additive.'},

  {id:'p15', topic:'graph', type:'concept', diff:'easy', source:'UAS 2025 · Isian 4 & PG7',
   q:'(a) What parameter must a subgraph meet to be "frequent" in frequent subgraph mining? (b) Graph embeddings store relational/structural data in what?',
   steps:['(a) It must occur at least **minimum support (minsup)** times across the graph database.','(b) Graph embeddings encode structure into a **vector space** (dense numeric vectors).'],
   answer:'(a) Minimum support (minsup). (b) A vector space.',
   tip:'minsup is the frequency threshold; embeddings = "graph → vectors" for ML.'},

  {id:'p16', topic:'text', type:'concept', diff:'med', source:'UAS 2024 · Q5 / 2025 Esai2',
   q:'Name 2 challenges of **web mining** vs ordinary text mining, and state what `BeautifulSoup.find()` returns.',
   steps:['Challenge 1: web data is **unstructured & inconsistent** (messy HTML, ads, navigation noise).','Challenge 2: **scale + dynamic JS content + legal/ethical limits** (robots.txt, rate limiting).','find(): returns the **first** HTML element matching the given tag, **with its contents**.'],
   answer:'Challenges: messy/unstructured HTML + huge dynamic scale & legal-ethical constraints. find() → first matching tag + its content.',
   tip:'User-Agent header makes the request look like a browser, not a bot (2025 Esai2b).'},

  {id:'p17', topic:'media', type:'compute', diff:'hard', source:'Asistensi · Image Mining',
   q:'Compute the decimal **Local Binary Pattern (LBP)** for the centre pixel (75), reading neighbours **clockwise from top-left**. Rule: neighbour ≥ centre → 1, else 0.',
   given:'I = [85 90 70]\n    [65 75 80]\n    [60 72 88]   centre C = 75',
   steps:[
     'Clockwise from top-left: TL=85≥75→1, TC=90≥75→1, TR=70<75→0, CR=80≥75→1, BR=88≥75→1, BC=72<75→0, BL=60<75→0, CL=65<75→0.',
     'Binary pattern (MSB=first neighbour): 1 1 0 1 1 0 0 0.',
     'Decimal = 1·2⁷+1·2⁶+0·2⁵+1·2⁴+1·2³+0+0+0 = 128+64+16+8.',
     '= 216.'
   ],
   answer:'LBP = `11011000` = **216**.',
   tip:'Use ≥ (not >) at the centre, and keep the neighbour order the question specifies. LBP captures LOCAL texture.'},

  {id:'p18', topic:'media', type:'compute', diff:'hard', source:'Asistensi · Image Mining',
   q:'Perform **valid 2D convolution** (no padding, stride 1, cross-correlation) of image I with kernel K. Give the feature map.',
   given:'I = [2 1 3]      K = [ 1 0]\n    [0 4 1]          [-1 2]\n    [1 2 0]',
   steps:[
     'Output size = (3−2+1)×(3−2+1) = 2×2.',
     'O(1,1)=2·1+1·0+0·(−1)+4·2 = 2+0+0+8 = 10.',
     'O(1,2)=1·1+3·0+4·(−1)+1·2 = 1+0−4+2 = −1.',
     'O(2,1)=0·1+4·0+1·(−1)+2·2 = 0+0−1+4 = 3.',
     'O(2,2)=4·1+1·0+2·(−1)+0·2 = 4+0−2+0 = 2.'
   ],
   answer:'Feature map = [[10, −1], [3, 2]].',
   tip:'Deep-learning "convolution" is really cross-correlation: overlay kernel, multiply element-wise, sum. Slide by the stride.'},

  {id:'p19', topic:'media', type:'compute', diff:'med', source:'Asistensi · Image Mining',
   q:'Apply **2×2 Max Pooling, stride 2, no padding** to the 4×4 feature map A. Give the output.',
   given:'A = [1 3 2 0]\n    [4 2 1 5]\n    [0 3 8 2]\n    [1 6 4 7]',
   steps:[
     'Split into four non-overlapping 2×2 blocks (stride 2).',
     'Top-left [[1,3],[4,2]] → max = 4. Top-right [[2,0],[1,5]] → max = 5.',
     'Bottom-left [[0,3],[1,6]] → max = 6. Bottom-right [[8,2],[4,7]] → max = 8.',
     'Assemble the 2×2 output.'
   ],
   answer:'Output = [[4, 5], [6, 8]].',
   tip:'Max pooling keeps the strongest activation per block → downsamples + adds translation tolerance.'},

  {id:'p20', topic:'media', type:'compute', diff:'med', source:'Asistensi · Audio Mining',
   q:'For signal $[1,2,1,-1]$, `np.fft.fft` gives $[3{+}0j,\\,0{-}3j,\\,-1{+}0j,\\,0{+}3j]$. (a) What is the **magnitude** spectrum? (b) Why wrap FFT in `np.abs()`? (c) What does `mask = freqs > 0` do?',
   steps:[
     '(a) magnitude = |complex| for each bin: |3|=3, |−3j|=3, |−1|=1, |3j|=3.',
     '(b) FFT returns **complex** numbers (real+imaginary); np.abs() gives the absolute **magnitude** so you can plot signal strength.',
     '(c) FFT produces a mirrored **negative-frequency** half; `freqs>0` keeps only the **positive** frequencies for a standard spectrum.'
   ],
   answer:'(a) [3, 3, 1, 3]. (b) FFT is complex → np.abs() = magnitude. (c) Keep positive frequencies only (drop the mirror).',
   tip:'|a+bj| = √(a²+b²). Magnitude spectrum is what you actually plot/feed to a model.'},

  {id:'p21', topic:'media', type:'concept', diff:'med', source:'Asistensi · Video Mining',
   q:'Object tracking: when is a **Kalman Filter** better than a **Particle Filter**? (a) car driving straight at constant speed on a highway; (b) a billiard ball bouncing randomly after collisions.',
   steps:[
     'Kalman assumes Gaussian noise + a linear motion model; state = a single Gaussian (mean+covariance).',
     'Particle makes no strong noise assumption (non-Gaussian OK) + handles non-linear motion; state = many random particles.',
     '(a) Highway car: linear, smooth → **Kalman** (deterministic, fast, cheap).',
     '(b) Bouncing ball: non-linear, erratic, messy → **Particle** (samples many possible trajectories).'
   ],
   answer:'(a) Kalman (linear + Gaussian). (b) Particle (non-linear + non-Gaussian).',
   tip:'Kalman = one neat Gaussian for smooth/linear motion; Particle = a cloud of samples for chaos.'},

  {id:'p22', topic:'media', type:'concept', diff:'easy', source:'Asistensi · Video Mining',
   q:'In **Background Subtraction**, the output is a **binary mask**. What do white and black pixels mean, and why is the white area called the **Region of Interest (ROI)**?',
   steps:[
     'Background subtraction subtracts a static background model from each frame; unchanged (redundant) pixels → 0.',
     'White pixels = **moving foreground** (changed vs the background model).',
     'Black pixels = **static background** (no change).',
     'The white region holds the dynamic info (people, vehicles) we mine → it is the **ROI**; black is ignored to save compute.'
   ],
   answer:'White = moving foreground, Black = static background. White = ROI because it carries the dynamic info worth analysing.',
   tip:'This directly attacks temporal redundancy: only analyse what actually moved.'},

  {id:'p23', topic:'media', type:'concept', diff:'med', source:'Asistensi · Audio Mining',
   q:'(a) Why can sound NOT travel in a vacuum? (b) Intuition for **Spectral Centroid**, **Zero-Crossing Rate**, and **MFCC**?',
   steps:[
     '(a) Sound is vibration propagating **through a medium**; a vacuum has no medium to carry it → no sound.',
     '(b) Spectral Centroid = "centre of mass" of the spectrum = brightness; high = sharp/bright, low = dull (≈ RMSE in the frequency domain).',
     'Zero-Crossing Rate = how often the signal changes sign = roughness; good for speech-vs-music & voiced-vs-unvoiced.',
     'MFCC = Mel-Frequency Cepstral Coefficients; maps to the perceptual **Mel scale** (human hearing), focuses on low frequencies.'
   ],
   answer:'(a) No medium in a vacuum. (b) Centroid=brightness, ZCR=roughness/sign-changes, MFCC=perceptual Mel-scale features.',
   tip:'Centroid≈RMSE-of-frequency; ZCR distinguishes smooth (voiced) vs rough (noise); MFCC mimics the ear.'}
];

/* ===================== MAIN APPLICATION (inline) ===================== */
const CONTENT=window.CONTENT, PROBLEMS=window.PROBLEMS;
const EXAM=new Date('2026-06-03T09:00:00');

/* ---- inline-math + bold renderer ---- */
function RichText({text}){
  const parts=String(text).split(/(\$[^$]+\$)/g);
  return <>{parts.map((p,i)=>{
    if(p.length>1&&p[0]==='$'&&p[p.length-1]==='$') return <Tex key={i}>{p.slice(1,-1)}</Tex>;
    const bs=p.split(/(\*\*[^*]+\*\*)/g);
    return bs.map((b,j)=> (b.startsWith('**')&&b.endsWith('**'))
      ? <strong key={i+'-'+j}>{b.slice(2,-2)}</strong>
      : <React.Fragment key={i+'-'+j}>{b}</React.Fragment>);
  })}</>;
}

/* ---- persistence ---- */
function useStore(key,init){
  const [v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch(e){return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch(e){}},[key,v]);
  return [v,setV];
}

/* ===================== POMODORO (50/5) ===================== */
function Pomodoro(){
  const [open,setOpen]=useState(false);
  const [phase,setPhase]=useState('focus'); // focus|break
  const [left,setLeft]=useState(50*60);
  const [run,setRun]=useState(false);
  const [done,setDone]=useStore('dm_focus_done',0);
  const FOC=50*60, BRK=5*60;
  useEffect(()=>{
    if(!run) return;
    const t=setInterval(()=>setLeft(l=>{
      if(l<=1){
        try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=phase==='focus'?660:520;g.gain.value=.1;o.start();setTimeout(()=>{o.stop();a.close();},450);}catch(e){}
        if(phase==='focus'){setDone(d=>d+1);setPhase('break');return BRK;}
        else{setPhase('focus');return FOC;}
      }
      return l-1;
    }),1000);
    return ()=>clearInterval(t);
  },[run,phase]);
  const mm=String(Math.floor(left/60)).padStart(2,'0'),ss=String(left%60).padStart(2,'0');
  if(!open) return <button className="pomo-fab" title="Study timer (50/5)" onClick={()=>setOpen(true)}>🍅</button>;
  return(
    <div className="pomo">
      <div className="pomo-head">
        <span className="pomo-phase">{phase==='focus'?'🎯 Focus':'☕ Break'}</span>
        <span style={{cursor:'pointer'}} onClick={()=>setOpen(false)}>✕</span>
      </div>
      <div className="pomo-body">
        <div className={'pomo-time'+(phase==='break'?' break':'')}>{mm}:{ss}</div>
        <div className="pomo-ctrl">
          <button className="primary" onClick={()=>setRun(r=>!r)}>{run?'Pause':'Start'}</button>
          <button onClick={()=>{setRun(false);setLeft(phase==='focus'?FOC:BRK);}}>Reset</button>
          <button onClick={()=>{setRun(false);if(phase==='focus'){setPhase('break');setLeft(BRK);}else{setPhase('focus');setLeft(FOC);}}}>Skip</button>
        </div>
        <div className="pomo-meta">🔥 {done} focus blocks done · 50 min study / 5 min process</div>
      </div>
    </div>
  );
}

function Countdown(){

  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(t);},[]);
  const ms=EXAM-now; const past=ms<=0;
  const h=Math.floor(Math.abs(ms)/3.6e6),d=Math.floor(h/24),hh=h%24,mm=Math.floor((Math.abs(ms)%3.6e6)/6e4);
  return <div className="count"><span className="dotpulse"></span>{past?'Exam in progress — good luck!':`UAS in ${d}d ${hh}h ${mm}m · Wed 3 Jun 2026, 09:00–11:30`}</div>;
}

/* ===================== TOPIC VIEW ===================== */
function FormulaRow({f,topicId,cheat,setCheat}){
  const key=topicId+'::'+f.n;
  const inSheet=cheat.some(c=>c.key===key);
  return(
    <div className="formula">
      <div className="formula-top">
        <span className="formula-n">{f.n}</span>
        <button className={'cheat-add'+(inSheet?' in':'')} onClick={()=>{
          setCheat(inSheet?cheat.filter(c=>c.key!==key):[...cheat,{key,n:f.n,tex:f.tex,topic:topicId,when:f.when}]);
        }}>{inSheet?'✓ on sheet':'+ cheatsheet'}</button>
      </div>
      <div className="formula-body"><Tex block>{f.tex}</Tex></div>
      <div className="formula-when"><RichText text={f.when}/></div>
    </div>
  );
}

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-app-config
  namespace: portfolio
data:
  default.conf: |
    server {
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }

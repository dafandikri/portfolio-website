apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    certResolvers:
      letsencrypt:
        email: dafandikri@gmail.com
        storage: /data/acme.json
        httpChallenge:
          entryPoint: web

    ports:
      web:
        redirectTo:
          port: websecure

    persistence:
      enabled: true
      storageClass: local-path
      path: /data
      size: 128Mi

name: Add SSH Key (one-shot recovery)

on:
  workflow_dispatch:
    inputs:
      pubkey:
        description: "Public key line to append to root authorized_keys"
        required: true

jobs:
  add-key:
    runs-on: ubuntu-latest
    steps:
      - name: Install public key on droplet
        uses: appleboy/ssh-action@v1
        env:
          NEW_PUBKEY: ${{ inputs.pubkey }}
        with:
          host: 165.245.144.120
          username: root
          key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
          envs: NEW_PUBKEY
          script: |
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            grep -qxF "$NEW_PUBKEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$NEW_PUBKEY" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo "authorized_keys now has $(wc -l < ~/.ssh/authorized_keys) key(s)"

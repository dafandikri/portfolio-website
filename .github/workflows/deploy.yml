name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/dafandikri/portfolio-website:latest
          build-args: |
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy k8s manifests to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 159.223.49.141
          username: root
          key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
          source: "k8s/"
          target: "/tmp/portfolio-deploy"

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: 159.223.49.141
          username: root
          key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
          script: |
            k3s kubectl apply -f /tmp/portfolio-deploy/k8s/namespace.yaml
            k3s kubectl apply -f /tmp/portfolio-deploy/k8s/configmap.yaml
            k3s kubectl apply -f /tmp/portfolio-deploy/k8s/deployment.yaml
            k3s kubectl apply -f /tmp/portfolio-deploy/k8s/service.yaml
            k3s kubectl apply -f /tmp/portfolio-deploy/k8s/ingress.yaml
            k3s kubectl rollout restart deployment/portfolio-app -n portfolio
            k3s kubectl rollout status deployment/portfolio-app -n portfolio --timeout=120s

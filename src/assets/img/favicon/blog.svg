<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel-art "blog post / article" icon on a 16x16 grid, to match the other
       low-res pixelated favicon icons. -->
  <!-- page border (black) + white interior -->
  <rect x="3" y="1" width="10" height="14" fill="#000000"/>
  <rect x="4" y="2" width="8" height="12" fill="#ffffff"/>
  <!-- navy title bar -->
  <rect x="5" y="3" width="6" height="2" fill="#000080"/>
  <!-- grey text lines -->
  <rect x="5" y="7" width="6" height="1" fill="#555555"/>
  <rect x="5" y="9" width="6" height="1" fill="#555555"/>
  <rect x="5" y="11" width="4" height="1" fill="#555555"/>
</svg>
